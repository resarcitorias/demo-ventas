<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ventas</title>
</head>
<body>
    <h1>Lista de Ventas</h1>
    <a href="/ventas/nueva">Nueva Venta</a>
    <table border="1">
        <tr>
            <th>ID</th><th>Fecha</th><th>Total</th><th>Detalle</th>
        </tr>
        <tr th:each="venta : ${ventas}">
            <td th:text="${venta.id}">1</td>
            <td th:text="${venta.fecha}">2025-01-01</td>
            <td th:text="${venta.totalventa}">1000</td>
            <td><a th:href="@{/ventas/{id}(id=${venta.id})}">Ver</a></td>
        </tr>
    </table>
    <br>
    <a href="/productos">Ir a Productos</a>
</body>
</html>
